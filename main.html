<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Loop</title>
    <link rel="icon" href="loop.png">
    <link rel="stylesheet" href="main-style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>

<body>
    <img class="image-gradient" src="gradient.png" alt="gradient">
    <div class="layer-blur"></div>

    <div class="container">
        <header>
            <img data-aos="fade-down" data-aos-duration="1500" class="logo" src="logo.png" alt="Career Loop Logo">

            <nav>
                <a data-aos="fade-down" data-aos-duration="1500" href="#">Community</a>
                <a data-aos="fade-down" data-aos-duration="2000" href="#">Attendance</a>
                <a data-aos="fade-down" data-aos-duration="2500" href="#">Resume AI</a>
                <a data-aos="fade-down" data-aos-duration="3000" href="# ">Skill Exchange</a>
                <a data-aos="fade-down" data-aos-duration="3000" href="# ">Dashboard</a>
            </nav>

            <button data-aos="fade-down" data-aos-duration="1500" class="sign-in">SIGNIN</button>
        </header>

        <main>

            <div class="slogan">
                <div class="content">
                    <div data-aos="fade-zoom-in" data-aos-easing="ease-in-back" data-aos-delay="300" data-aos-offset="0"
                        data-aos-duration="1500" class="tag-box">
                        <div class="tag">Introducing &wedbar;</div>
                    </div>

                    <h1 data-aos="fade-zoom-in" data-aos-easing="ease-in-back" data-aos-delay="300" data-aos-offset="0"
                        data-aos-duration="2000">Smart Student Dashboard<br>For Modern Learners</h1>

                    <p data-aos="fade-zoom-in" data-aos-easing="ease-in-back" data-aos-delay="300" data-aos-offset="0"
                        data-aos-duration="2500" class="description">All-In-One Hub To Track Goals & Growth.</p>

                    <div data-aos="fade-zoom-in" data-aos-easing="ease-in-back" data-aos-delay="300" data-aos-offset="0"
                        data-aos-duration="3000" class="buttons">
                        <a href="#" class="btn-get-started">Get Started &gt;</a>
                        <a href="#" class="btn-explore">Explore Features &gt;</a>
                    </div>
                </div>
            </div>
        </main>

        <spline-viewer data-aos="fade-zoom-in" data-aos-easing="ease-in-back" data-aos-delay="300" data-aos-offset="0"
            data-aos-duration="3000" class="robot-3d"
            url="https://prod.spline.design/Ajh8iEZ8VSdSTk1u/scene.splinecode"></spline-viewer>

    </div>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.67/build/spline-viewer.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init();</script>
    <script src="main-script.js"></script>

</body>

</html>
